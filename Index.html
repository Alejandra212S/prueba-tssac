<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prueba de HTML con Firebase</title>
</head>

<body>

    <h1>Registro de usuarios</h1>

    <input type="text"
           id="username"
           placeholder="Ingrese el nombre de usuario">

    <button onclick="guardar()">Guardar registro</button>
    <button onclick="mostrar()">Mostrar registros de usuarios</button>

    <hr>

    <div id="resultados"></div>

    <script type="module">

        import { initializeApp }
        from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

        import {
            getFirestore,
            collection,
            addDoc,
            getDocs
        }
        from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

           const firebaseConfig = {
    apiKey: "AIzaSyATcjeutftBECVLFPMRAzuOFK-g-v8uGB4",
    authDomain: "pruebatssac-6bd1e.firebaseapp.com",
    projectId: "pruebatssac-6bd1e",
    storageBucket: "pruebatssac-6bd1e.firebasestorage.app",
    messagingSenderId: "244946243424",
    appId: "1:244946243424:web:c3a65f8bdee05641e19805"
  };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.guardar = async function () {

            const username =
                document.getElementById("username").value;

            if (username.trim() === "") {
                alert("Ingrese un nombre de usuario");
                return;
            }

            try {

                await addDoc(
                    collection(db, "usuarios"),
                    {
                        username: username
                    }
                );

                alert("Usuario registrado correctamente");

                document.getElementById("username").value = "";

            } catch (error) {

                console.error("Error Firebase:", error);
                alert(error.message);

            }
        };

        window.mostrar = async function () {

            try {

                const consulta =
                    await getDocs(
                        collection(db, "usuarios")
                    );

                let salida = "";

                consulta.forEach((doc) => {

                    salida +=
                        doc.data().username + "<br>";

                });

                document.getElementById("resultados")
                        .innerHTML = salida;

            } catch (error) {

                console.error("Error Firebase:", error);
                alert(error.message);

            }

        };

    </script>

</body>
</html>
